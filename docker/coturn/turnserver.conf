# Coturn TURN Server Configuration
# BreadCall - WebRTC Live Production Platform

# Server identity
server-name=BreadCall-TURN
realm=BreadCall
vendor-id=BreadCall

# Listening ports
listening-port=3478
tls-listening-port=5349

# External IP (set via environment or override)
# external-ip=<your-server-public-ip>

# Authentication
lt-cred-mech
user=turnuser:turnpassword
# For time-limited HMAC credentials, use:
# use-auth-secret
# static-auth-secret=${TURN_SECRET}

# Realm for authentication
realm=BreadCall

# Total quota on number of sessions
max-bps=0

# Prohibit TURN connections on the same port as the peer
no-loopback-peers

# Prohibit TURN connections to private IP addresses (RFC1918)
# no-multicast-peers

# IP address ranges for relay addresses
fingerprint
no-tcp-relay

# Relay ports
min-port=49152
max-port=65535

# Verbose logging
verbose
log-file=/var/log/turnserver/turnserver.log
# syslog

# Server relay
no-stun

# Keep alive
no-cli

# Certificate paths (for TLS)
# cert=/etc/coturn/certs/turnserver.crt
# pkey=/etc/coturn/certs/turnserver.pkey

# DH parameters
# dh-file=/etc/coturn/certs/dhparams.pem

# Cipher list
cipher-list="ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256"

# ECDH curve
# ecdh-curve=secp384r1

# SSL options
# no-sslv3
# no-tlsv1
# no-tlsv1_1

# Enable TCP and UDP relay
# promiscuous

# Soft time limit on allocations
max-port-range=65535

# Default relay time-to-live
default-relay-timeout=3600

# Connection lifetime
stun-lifetime=600
turn-lifetime=7200

# Total bandwidth capacity (bytes per second)
# total-quota=0

# Deny certain peering addresses
# deny-peer=127.0.0.0/8
# deny-peer=10.0.0.0/8
# deny-peer=172.16.0.0/12
# deny-peer=192.168.0.0/16

# Allowed peer addresses
# allowed-peer-ip=0.0.0.0-255.255.255.255

# Deny certain relay IP addresses
# deny-ip=127.0.0.0/8
# deny-ip=10.0.0.0/8

# Relay threads
# relay-threads=1

# Net engine options
# net-engine=udp

# Auxiliary server settings
# auxiliary-server=0.0.0.0:3479

# Alternative STUN servers
# alternate-server=127.0.0.1:3480

# Enable TCP and UDP for STUN
# use-stun-auth

# Enable STUN/TURN over TCP
# tcp-relay

# WebRTC support
# websockets

# Websockets port
# websockets-port=8083

# Secure websockets port
# secure-websockets-port=8084
