# MediaMTX configuration for BreadCall
# WHIP/WHEP WebRTC streaming - v1.16.3 compatible

# Global settings
logLevel: info
logDestinations: [stdout]

# HTTP API for path management (required for SRT pull mode)
api: yes
apiAddress: :9997

# Disable unused protocols
rtsp: false
rtmp: false
hls: false
srt: true
srtAddress: :8890

# WebRTC configuration (WHIP/WHEP)
webrtc: true
webrtcAddress: :8887
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :9000
webrtcLocalTCPAddress: :9000
webrtcIPsFromInterfaces: true

# Default path settings
pathDefaults:
  source: publisher

# Paths - allow any stream name (dynamic room/participant streams)
paths:
  # Regex path for room streams (matches room/*)
  ~^room/.*$:
    source: publisher
    runOnReady: 'curl -X POST http://signaling:3000/api/mediamtx/stream-event -H "Content-Type: application/json" -d "{\"path\":\"%path\",\"event\":\"publish_start\"}"'
    runOnNotReady: 'curl -X POST http://signaling:3000/api/mediamtx/stream-event -d "{\"path\":\"%path\",\"event\":\"publish_end\"}"'

  # Wildcard path for other streams (e.g., direct participant streams)
  ~^.*$:
    source: publisher
