worker_processes auto;
worker_rlimit_nofile 8192; # Increased file descriptor limit to match connections

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format websocket '$remote_addr - $remote_user [$time_local] "$request" '
                         '$status $body_bytes_sent "$http_referer" '
                         '"$http_upgrade" "$connection"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000; # Allow more requests over a single keepalive connection
    types_hash_max_size 2048;
    client_max_body_size 10M;
    client_body_buffer_size 16k; # Optimize RAM vs Disk buffering for uploads

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024; # Avoid wasting CPU compressing tiny files
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstreams
    upstream signaling {
        server signaling:3000;
        keepalive 32;
    }

    upstream mediamtx {
        server mediamtx:8887;
        keepalive 32;
    }

    # Dynamic Connection Map: 
    # Sets "Upgrade" for WebSockets, or clears it ("") for HTTP Keep-Alives to upstreams
    map $http_upgrade $proxy_connection {
        default upgrade;
        ''      "";
    }

    # Main server block
    server {
        listen 80;
        server_name call.bachtam2001.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # --- Global Proxy Headers ---
        # Inherited by all locations unless explicitly overridden
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $proxy_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Root location
        root /usr/share/nginx/html;
        index index.html;

        # Login page
        location = /login {
            rewrite ^/login$ /login.html last;
        }

        location = /login.html {
            try_files $uri =404;
        }

        # Admin panel
        location = /admin {
            rewrite ^/admin$ /admin.html last;
        }

        location = /admin.html {
            try_files $uri =404;
        }

        # Director dashboard
        location = /director-dashboard {
            rewrite ^/director-dashboard$ /director-dashboard.html last;
        }

        location = /director-dashboard.html {
            try_files $uri =404;
        }

        # Moderator dashboard
        location = /moderator-dashboard {
            rewrite ^/moderator-dashboard$ /moderator-dashboard.html last;
        }

        location = /moderator-dashboard.html {
            try_files $uri =404;
        }

        # Monitoring dashboard
        location = /monitoring {
            rewrite ^/monitoring$ /monitoring.html last;
        }

        location = /monitoring.html {
            try_files $uri =404;
        }

        # SPA Routes - Room and Director views (serve index.html for client-side routing)
        location /room/ {
            try_files $uri $uri/ /index.html;
        }

        location /director/ {
            try_files $uri $uri/ /index.html;
        }

        # Static files with aggressive no-cache for JS files
        location ~* ^/(?!view/).*\.js$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate, private" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            etag off;
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        # API proxy to signaling server
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;
            
            proxy_pass http://signaling/api/;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 30s;
        }

        # WebSocket proxy for signaling server
        location /ws {
            proxy_pass http://signaling/ws;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # MediaMTX WHIP/WHEP proxy (Consolidated)
        location ~ ^/[^/]+/(whip|whep)(/.*)?$ {
            proxy_pass http://mediamtx;
            proxy_read_timeout 30s;
            proxy_buffering off;
            proxy_redirect off;
        }

        # SoloView/DirectorView Proxy (Consolidated)
        # 1. Enforce trailing slash (Standard routing practice)
        location ~ ^/view/([^/]+)$ {
            return 301 /view/$1/;
        }
        # 2. Map standard prefix directly to upstream
        location /view/ {
            proxy_pass http://mediamtx/;
            proxy_read_timeout 30s;
            proxy_buffering off;
            proxy_redirect off;
        }

        # Health check endpoint
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            # Inherits root from server block automatically
        }
    }
}