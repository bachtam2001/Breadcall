services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/database/migrations/001-postgres-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
    environment:
      POSTGRES_DB: breadcall
      POSTGRES_USER: breadcall
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    networks:
      - breadcall-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breadcall -d breadcall"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - breadcall-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  signaling:
    image: ghcr.io/bachtam2001/breadcall:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.monitor-only=false"
    env_file:
      - ./.env
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://breadcall:${DB_PASSWORD:-changeme}@postgres:5432/breadcall
      - REDIS_URL=redis://redis:6379
      - DB_POOL_MIN=2
      - DB_POOL_MAX=10
      # Set EXTERNAL_URL to your public domain for correct token URL generation
      # Example: - EXTERNAL_URL=https://your-domain.com
      - EXTERNAL_URL=${EXTERNAL_URL:-}
    volumes:
      - ./logs:/app/logs
      - breadcall-public:/app/public
    networks:
      - breadcall-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Web Frontend (nginx)
  web:
    image: nginx:alpine
    ports:
      - "18080:80"
    volumes:
      - breadcall-public:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - breadcall-network
    restart: unless-stopped
    depends_on:
      - mediamtx
      - signaling

  # MediaMTX SFU (WHIP/WHEP WebRTC)
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      # WebRTC HTTP signaling (WHIP/WHEP)
      - "8887:8887/tcp"
      # WebRTC ICE traffic (UDP and TCP)
      - "9000:9000/udp"
      - "9000:9000/tcp"
      # SRT (UDP)
      - "8890:8890/udp"
      # Optional: HLS fallback
      # - "8886:8886"
    volumes:
      - ./docker/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - breadcall-network
    restart: unless-stopped

  # Watchtower - Automatic container updates
  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    environment:
      # Docker API version compatibility
      - DOCKER_API_VERSION=1.40
      # Poll every 5 minutes (300 seconds)
      - WATCHTOWER_POLL_INTERVAL=300
      # Enable rolling restart for zero-downtime updates
      - WATCHTOWER_ROLLING_RESTART=true
      # Only update containers with watchtower.enable label
      - WATCHTOWER_LABEL_ENABLE=true
      # Clean up old images after update
      - WATCHTOWER_CLEANUP=true
      # Include stopped containers in monitoring
      - WATCHTOWER_INCLUDE_STOPPED=true
      # Don't start stopped containers unless they were stopped by watchtower
      - WATCHTOWER_REVIVE_STOPPED=false
      # Timeout for container operations
      - WATCHTOWER_TIMEOUT=60s
      # Debug logging (optional, remove in production)
      # - WATCHTOWER_DEBUG=true
      # Notifications (optional - configure as needed)
      # - WATCHTOWER_NOTIFICATIONS=shoutrrr
      # - WATCHTOWER_NOTIFICATION_URL=discord://token@id
      # - WATCHTOWER_NOTIFICATION_TITLE_TAG=BreadCall
    command: --label-enable
    networks:
      - breadcall-network
    restart: unless-stopped

volumes:
  breadcall-public:
  postgres-data:
  redis-data:

networks:
  breadcall-network:
