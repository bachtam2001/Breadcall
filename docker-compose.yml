version: '3.8'

services:
  # Signaling Server (Node.js + Express + WebSocket)
  signaling:
    build:
      context: .
      dockerfile: Dockerfile.signaling
    ports:
      - "${SIGNALING_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TURN_SECRET=${TURN_SECRET:-breadcall-turn-secret}
      - TURN_REALM=${TURN_REALM:-BreadCall}
      # Limit Node.js heap size to prevent memory exhaustion
      - NODE_OPTIONS=--max-old-space-size=512
    volumes:
      - ./logs:/app/logs
    networks:
      - breadcall-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 256M

  # Web Frontend (nginx)
  web:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./client:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - breadcall-network
    restart: unless-stopped
    depends_on:
      - signaling
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M

  # OvenMediaEngine SFU
  ovenmediaengine:
    image: airensoft/ovenmediaengine:latest
    ports:
      - "3333:3333"                 # WebRTC Signaling
      - "3478:3478"                 # TURN TCP
      - "3478:3478/udp"             # TURN UDP
      - "8081:8081"                 # REST API
      - "9999:9999/udp"             # SRT Ingest / Publish
      - "10000-10010:10000-10010/udp" # WebRTC ICE Candidates
    volumes:
      - ./docker/ome/Server.xml:/opt/ovenmediaengine/bin/origin_conf/Server.xml:ro
    environment:
      - OME_HOST_IP=${EXTERNAL_IP:-127.0.0.1}
      - OME_REST_KEY=${TURN_SECRET:-breadcall-turn-secret}
    networks:
      - breadcall-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.5'
        reservations:
          memory: 256M

networks:
  breadcall-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  turn-logs:
    driver: local
