services:
  signaling:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - PORT=3000
    volumes:
      - ./logs:/app/logs
      - breadcall-public:/app/public
    networks:
      - breadcall-network
    restart: unless-stopped

  # Web Frontend (nginx)
  web:
    image: nginx:alpine
    ports:
      - "18080:80"
    volumes:
      - breadcall-public:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - breadcall-network
    restart: unless-stopped
    depends_on:
      - mediamtx
      - signaling

  # MediaMTX SFU (WHIP/WHEP WebRTC)
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      # WebRTC HTTP signaling (WHIP/WHEP)
      - "8887:8887/tcp"
      # WebRTC ICE traffic (UDP and TCP)
      - "9000:9000/udp"
      - "9000:9000/tcp"
      # SRT (UDP)
      - "8890:8890/udp"
      # Optional: HLS fallback
      # - "8886:8886"
    volumes:
      - ./docker/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - breadcall-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8887 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  breadcall-public:

networks:
  breadcall-network:
