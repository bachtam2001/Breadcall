services:
  signaling:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3000
    volumes:
      - ./logs:/app/logs
    networks:
      - breadcall-network
    restart: unless-stopped

  # Web Frontend (nginx)
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - breadcall-network
    restart: unless-stopped
    depends_on:
      - signaling

  # MediaMTX SFU (WHIP/WHEP WebRTC)
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      # WebRTC HTTP signaling (WHIP/WHEP)
      - "8887:8887/tcp"
      # WebRTC ICE traffic (UDP and TCP)
      - "9000:9000/udp"
      - "9000:9000/tcp"
      # SRT (UDP)
      - "8890:8890/udp"
      # Optional: HLS fallback
      # - "8886:8886"
    volumes:
      - ./docker/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - breadcall-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8887"]
      interval: 30s
      timeout: 10s
      retries: 3
