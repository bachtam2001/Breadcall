services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/database/migrations/001-postgres-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
    environment:
      POSTGRES_DB: breadcall
      POSTGRES_USER: breadcall
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    networks:
      - breadcall-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breadcall -d breadcall"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - breadcall-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  signaling:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://breadcall:${DB_PASSWORD:-changeme}@postgres:5432/breadcall
      - REDIS_URL=redis://redis:6379
      - DB_POOL_MIN=2
      - DB_POOL_MAX=10
    volumes:
      - ./logs:/app/logs
      - breadcall-public:/app/public
    networks:
      - breadcall-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Web Frontend (nginx)
  web:
    image: nginx:alpine
    ports:
      - "18080:80"
    volumes:
      - breadcall-public:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - breadcall-network
    restart: unless-stopped
    depends_on:
      - mediamtx
      - signaling

  # MediaMTX SFU (WHIP/WHEP WebRTC)
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      # WebRTC HTTP signaling (WHIP/WHEP)
      - "8887:8887/tcp"
      # WebRTC ICE traffic (UDP and TCP)
      - "9000:9000/udp"
      - "9000:9000/tcp"
      # SRT (UDP)
      - "8890:8890/udp"
      # Optional: HLS fallback
      # - "8886:8886"
    volumes:
      - ./docker/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - breadcall-network
    restart: unless-stopped

volumes:
  breadcall-public:
  postgres-data:
  redis-data:

networks:
  breadcall-network:
