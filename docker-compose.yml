services:
  # Signaling Server (Node.js + Express + WebSocket)
  signaling:
    build:
      context: .
      dockerfile: Dockerfile.signaling
    ports:
      - "${SIGNALING_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TURN_SECRET=${TURN_SECRET:-breadcall-turn-secret}
      - TURN_REALM=${TURN_REALM:-BreadCall}
      # Limit Node.js heap size to prevent memory exhaustion
      - NODE_OPTIONS=--max-old-space-size=512
    volumes:
      - ./logs:/app/logs
    networks:
      - breadcall-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 256M

  # Web Frontend (nginx)
  web:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./client:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - breadcall-network
    restart: unless-stopped
    depends_on:
      - signaling
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M

  # MediaMTX SFU (WHIP/WHEP WebRTC)
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      # WebRTC HTTP signaling (WHIP/WHEP)
      - "8887:8887/tcp"
      # WebRTC ICE traffic (UDP and TCP)
      - "9000:9000/udp"
      - "9000:9000/tcp"
      - "8890:8890/udp"
      # Optional: HLS fallback
      # - "8886:8886"
    volumes:
      - ./docker/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - breadcall-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8887"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  breadcall-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  turn-logs:
    driver: local
