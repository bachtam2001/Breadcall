# Docker Compose override for distributed/multi-server deployment
# Usage: docker compose -f docker-compose.yml -f docker-compose.distributed.yml up -d

version: '3.8'

services:
  # Coturn instance 1 (Server A)
  coturn:
    environment:
      - EXTERNAL_IP=${EXTERNAL_IP_1:-server1.example.com}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Signaling server with scaling
  signaling:
    deploy:
      replicas: ${SIGNALING_REPLICAS:-2}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Web frontend with load balancing
  web:
    deploy:
      replicas: ${WEB_REPLICAS:-2}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

# Note: For true multi-server deployment:
# 1. Run coturn on separate servers with different external IPs
# 2. Use DNS round-robin or load balancer for signaling servers
# 3. Configure coturn with same secret but different external IPs
#
# Example for Server B (copy this file and modify EXTERNAL_IP):
# docker-compose.server2.yml:
# services:
#   coturn:
#     environment:
#       - EXTERNAL_IP=server2.example.com
