services:
  # Database migrations - runs before signaling
  migrations:
    image: postgres:17-alpine
    volumes:
      - ./server/database/migrations:/migrations:ro
    environment:
      DATABASE_URL: postgres://breadcall:${DB_PASSWORD:-changeme}@postgres:5432/breadcall
    networks:
      - breadcall-network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c '
        echo "Running database migrations..." &&
        export PGPASSWORD=${DB_PASSWORD:-changeme} &&
        psql -h postgres -U breadcall -d breadcall -f /migrations/001-postgres-schema.sql &&
        echo "Migrations complete!"
      '
    restart: "no"

  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: breadcall
      POSTGRES_USER: breadcall
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    networks:
      - breadcall-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breadcall -d breadcall"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - breadcall-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  signaling:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file:
      - ./.env
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://breadcall:${DB_PASSWORD:-changeme}@postgres:5432/breadcall
      - REDIS_URL=redis://redis:6379
      - DB_POOL_MIN=2
      - DB_POOL_MAX=10
      - EXTERNAL_URL=${EXTERNAL_URL:-}
    volumes:
      - ./logs:/app/logs
      - breadcall-public:/app/public
    networks:
      - breadcall-network
    restart: unless-stopped
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Web Frontend (nginx)
  web:
    image: nginx:alpine
    ports:
      - "18080:80"
    volumes:
      - breadcall-public:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - breadcall-network
    restart: unless-stopped
    depends_on:
      - mediamtx
      - signaling

  # MediaMTX SFU (WHIP/WHEP WebRTC)
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8887:8887/tcp"
      - "9000:9000/udp"
      - "9000:9000/tcp"
      - "8890:8890/udp"
    volumes:
      - ./docker/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - breadcall-network
    restart: unless-stopped

volumes:
  breadcall-public:
  postgres-data:
  redis-data:

networks:
  breadcall-network:
